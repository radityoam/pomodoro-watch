<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Watch</title>
<style>
  :root{
    --screen:#050506;
    --bezel-1:#3a3d42;
    --bezel-2:#6b6f76;
    --bezel-3:#23262b;
    --ink:#f5f6f7;
    --ink-dim:#8a8f98;
    --focus:#34c759;
    --focus-edge:#ff9f0a;
    --short:#2dd4bf;
    --long:#5ea0ff;
    --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
    user-select:none;
  }

  /* ---- The watch device (this whole block is the floating window in Electron) ---- */
  .device{
    position:relative;
    zoom:.82;                           /* shrink the whole watch uniformly */
    -webkit-app-region:drag;            /* drag the watch to move the window */
    width:300px;height:360px;
    border-radius:72px;
    padding:11px;
    background:
      linear-gradient(150deg,var(--bezel-2),var(--bezel-3) 42%,var(--bezel-1) 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.10) inset,
      0 2px 0 rgba(255,255,255,.15) inset;
  }
  /* the digital crown nub, purely cosmetic */
  .crown{
    position:absolute;right:-4px;top:122px;width:7px;height:44px;border-radius:4px;
    background:linear-gradient(90deg,var(--bezel-3),var(--bezel-2));
    box-shadow:0 0 0 1px rgba(0,0,0,.3);
  }
  .screen{
    position:relative;width:100%;height:100%;
    background:
      radial-gradient(135% 80% at 50% -8%, #1c222c 0%, #11151b 46%, #07090c 100%);
    border-radius:60px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,0,0,.6) inset;
  }
  /* faint phase-tinted glow, sits behind everything */
  .screen::before{
    content:"";position:absolute;inset:0;z-index:0;
    background:radial-gradient(70% 45% at 50% 22%, var(--glow,rgba(52,199,89,.10)) 0%, transparent 70%);
    transition:background .4s ease;
    pointer-events:none;
  }
  .view{z-index:1}

  /* window controls: macOS-style traffic lights, always visible, inside the face */
  .pill,.icon-btn,.stepper button,.done,.winbtn{-webkit-app-region:no-drag}
  .winbar{
    position:absolute;top:30px;right:40px;z-index:6;
    display:flex;gap:8px;
  }
  .winbtn{
    width:13px;height:13px;border:none;border-radius:50%;padding:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 .5px rgba(0,0,0,.25) inset;
  }
  .winbtn svg{opacity:0;transition:opacity .14s ease}
  .winbar:hover .winbtn svg{opacity:1}
  .winbtn.min{background:#28c840}
  .winbtn.min svg{stroke:#0b5018}
  .winbtn.close{background:#ff5f57}
  .winbtn.close svg{stroke:#7d0a05}
  .view{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;
    transition:opacity .22s ease, transform .22s ease;
  }
  .view.hidden{opacity:0;transform:scale(.97);pointer-events:none}

  /* ---------------- TIMER VIEW ---------------- */
  #timerView{padding:34px 30px 22px}
  .time{
    font-size:56px;font-weight:600;letter-spacing:-1.5px;
    font-variant-numeric:tabular-nums;
    margin-top:10px;
  }
  .cycle{
    margin-top:5px;
    font-size:11px;font-weight:600;letter-spacing:1.6px;
    text-transform:uppercase;color:var(--ink-dim);
  }

  .gauge-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%}
  .gauge{width:210px;height:84px;overflow:visible}
  .tick{stroke:var(--ink);stroke-width:2;stroke-linecap:round;opacity:.22;transition:opacity .3s}
  .tick.past{opacity:.06}
  #marker{transition:none}

  .controls{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:4px}
  .controls .icon-row{display:flex;align-items:center;gap:12px}
  .pill{
    height:42px;padding:0 28px;border:none;border-radius:21px;
    background:#1c1d20;color:var(--ink);
    font-size:14px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:8px;
    transition:background .15s, transform .08s;
  }
  .pill:hover{background:#26282c}
  .pill:active{transform:scale(.96)}
  .pill svg{flex:none}
  .icon-btn{
    width:38px;height:38px;border:none;border-radius:50%;
    background:#1c1d20;color:var(--ink-dim);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s,transform .08s;
  }
  .icon-btn:hover{background:#26282c;color:var(--ink)}
  .icon-btn:active{transform:scale(.92)}

  /* ---------------- SETTINGS VIEW ---------------- */
  #settingsView{padding:24px 18px 16px;justify-content:flex-start}
  .set-head{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    margin-bottom:14px;
  }
  .set-head h2{font-size:13px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink)}
  .row{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    padding:9px 0;border-bottom:1px solid var(--line);
  }
  .row:last-of-type{border-bottom:none}
  .row .label{font-size:12.5px;color:var(--ink-dim);font-weight:500}
  .stepper{display:flex;align-items:center;gap:9px}
  .stepper button{
    width:24px;height:24px;border:none;border-radius:50%;
    background:#1c1d20;color:var(--ink);font-size:15px;line-height:1;cursor:pointer;
    transition:background .12s,transform .08s;
  }
  .stepper button:hover{background:#2c2e33}
  .stepper button:active{transform:scale(.9)}
  .stepper .val{min-width:42px;text-align:center;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .done{
    margin-top:16px;width:100%;height:36px;border:none;border-radius:18px;
    background:var(--focus);color:#03210f;font-size:13px;font-weight:700;cursor:pointer;
    transition:filter .15s,transform .08s;
  }
  .done:hover{filter:brightness(1.08)}
  .done:active{transform:scale(.97)}
</style>
</head>
<body>
  <div class="device">
    <div class="winbar">
      <button class="winbtn min" id="winMin" title="Minimize">
        <svg width="7" height="7" viewBox="0 0 10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 5h6"/></svg>
      </button>
      <button class="winbtn close" id="winClose" title="Close">
        <svg width="7" height="7" viewBox="0 0 10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 2l6 6M8 2l-6 6"/></svg>
      </button>
    </div>
    <div class="crown"></div>
    <div class="screen">

      <!-- TIMER -->
      <div class="view" id="timerView">
        <div class="time" id="timeText">25:00</div>
        <div class="cycle" id="cycleText">Focus · 1st cycle</div>

        <div class="gauge-wrap">
          <svg class="gauge" id="gauge" viewBox="0 0 210 84"></svg>
        </div>

        <div class="controls">
          <button class="pill" id="playBtn">
            <span id="playIcon"></span>
            <span id="playLabel">Start</span>
          </button>
          <div class="icon-row">
            <button class="icon-btn" id="resetBtn" title="Reset">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
            <button class="icon-btn" id="settingsBtn" title="Settings">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- SETTINGS -->
      <div class="view hidden" id="settingsView">
        <div class="set-head">
          <h2>Settings</h2>
        </div>
        <div class="row">
          <span class="label">Focus</span>
          <div class="stepper" data-key="focus" data-min="10" data-max="120" data-step="5">
            <button data-d="-1">−</button><span class="val"></span><button data-d="1">+</button>
          </div>
        </div>
        <div class="row">
          <span class="label">Short break</span>
          <div class="stepper" data-key="short" data-min="1" data-max="30" data-step="1">
            <button data-d="-1">−</button><span class="val"></span><button data-d="1">+</button>
          </div>
        </div>
        <div class="row">
          <span class="label">Long break</span>
          <div class="stepper" data-key="long" data-min="5" data-max="60" data-step="5">
            <button data-d="-1">−</button><span class="val"></span><button data-d="1">+</button>
          </div>
        </div>
        <div class="row">
          <span class="label">Cycles</span>
          <div class="stepper" data-key="cycles" data-min="2" data-max="8" data-step="1">
            <button data-d="-1">−</button><span class="val"></span><button data-d="1">+</button>
          </div>
        </div>
        <button class="done" id="doneBtn">Done</button>
      </div>

    </div>
  </div>

<script>
// ---------------- STATE ----------------
// In this browser prototype settings live in memory. In the Electron build
// these get saved to a small local JSON file so they persist between launches.
const settings = { focus:25, short:5, long:15, cycles:4 }; // minutes / count

const PHASE = { FOCUS:'focus', SHORT:'short', LONG:'long' };
const phaseColor = { focus:'#34c759', short:'#2dd4bf', long:'#5ea0ff' };
const phaseGlow  = { focus:'rgba(52,199,89,.10)', short:'rgba(45,212,191,.10)', long:'rgba(94,160,255,.11)' };
const phaseLabel = { focus:'Focus', short:'Short break', long:'Long break' };

let phase = PHASE.FOCUS;
let cycle = 1;                 // which focus cycle we're on
let totalMs = settings.focus*60*1000;
let remainingMs = totalMs;
let running = false;
let lastTick = 0;             // performance.now timestamp of last frame

// ---------------- GAUGE GEOMETRY ----------------
// One source of truth: angleToPoint(). Ticks AND the moving marker both use it,
// so the marker always sits exactly on the arc no matter how we tune these.
const ARC = { cx:105, cy:340, r:300, a0:250, a1:290, ticks:39, len:11 };
const rad = d => d*Math.PI/180;
function angleToPoint(deg, r){
  return { x: ARC.cx + r*Math.cos(rad(deg)), y: ARC.cy + r*Math.sin(rad(deg)) };
}

const gauge = document.getElementById('gauge');
function buildGauge(){
  let svg = '';
  for(let i=0;i<ARC.ticks;i++){
    const t = i/(ARC.ticks-1);
    const a = ARC.a0 + t*(ARC.a1-ARC.a0);
    const o = angleToPoint(a, ARC.r+ARC.len);
    const inn = angleToPoint(a, ARC.r);
    svg += `<line class="tick" data-i="${i}" x1="${inn.x.toFixed(1)}" y1="${inn.y.toFixed(1)}" x2="${o.x.toFixed(1)}" y2="${o.y.toFixed(1)}"/>`;
  }
  // marker: a short rounded bar sitting on the arc with an orange leading edge
  svg += `<g id="marker">
    <line id="markerEdge" stroke="${phaseColor.focus}" stroke-width="7" stroke-linecap="round"/>
    <line id="markerCap"  stroke="${'#ff9f0a'}"          stroke-width="7" stroke-linecap="round"/>
  </g>`;
  gauge.innerHTML = svg;
}
buildGauge();

const ticks = () => gauge.querySelectorAll('.tick');
function drawMarker(frac){
  const a = ARC.a0 + frac*(ARC.a1-ARC.a0);
  const p1 = angleToPoint(a, ARC.r-3);
  const p2 = angleToPoint(a, ARC.r+ARC.len+3);
  const mid = angleToPoint(a, ARC.r+ARC.len*0.55);
  const edge = document.getElementById('markerEdge');
  const cap  = document.getElementById('markerCap');
  edge.setAttribute('x1',p1.x); edge.setAttribute('y1',p1.y);
  edge.setAttribute('x2',mid.x); edge.setAttribute('y2',mid.y);
  cap.setAttribute('x1',mid.x); cap.setAttribute('y1',mid.y);
  cap.setAttribute('x2',p2.x); cap.setAttribute('y2',p2.y);
  edge.setAttribute('stroke', phaseColor[phase]);
  // dim ticks the marker has already passed
  const passedIdx = Math.round(frac*(ARC.ticks-1));
  ticks().forEach((tk,i)=> tk.classList.toggle('past', i<passedIdx));
}

// ---------------- BEEP (no audio files) ----------------
let audioCtx;
function beep(freq=880, dur=0.12){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ---------------- RENDER ----------------
const timeText = document.getElementById('timeText');
const cycleText = document.getElementById('cycleText');
const playLabel = document.getElementById('playLabel');
const playIcon = document.getElementById('playIcon');
const ICON_PLAY  = '<svg width="10" height="12" viewBox="0 0 12 14" fill="currentColor"><path d="M1.5 1.1c0-.7.75-1.1 1.35-.74l8 5.4a.9.9 0 0 1 0 1.48l-8 5.4c-.6.36-1.35-.04-1.35-.74z"/></svg>';
const ICON_PAUSE = '<svg width="10" height="12" viewBox="0 0 12 14" fill="currentColor"><rect x="0.5" y="0" width="3.6" height="14" rx="1.4"/><rect x="7.9" y="0" width="3.6" height="14" rx="1.4"/></svg>';

function fmt(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  const m = Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

function render(){
  timeText.textContent = fmt(remainingMs);
  cycleText.textContent = `${phaseLabel[phase]} · ${ordinal(cycle)} cycle`;
  playIcon.innerHTML = running ? ICON_PAUSE : ICON_PLAY;
  document.querySelector('.screen').style.setProperty('--glow', phaseGlow[phase]);
  playLabel.textContent = running ? 'Pause' : (remainingMs<totalMs ? 'Resume' : 'Start');
  drawMarker(1 - remainingMs/totalMs);
}

// ---------------- TIMER LOOP (rAF = smooth) ----------------
function loop(now){
  if(running){
    const dt = now - lastTick;
    lastTick = now;
    remainingMs -= dt;
    if(remainingMs <= 0){ remainingMs = 0; nextPhase(); }
    render();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function startPhase(p, c){
  phase = p; if(c) cycle = c;
  totalMs = settings[p]*60*1000;
  remainingMs = totalMs;
  render();
}
function nextPhase(){
  beep(523,0.18); setTimeout(()=>beep(659,0.18),140); // two-note "done"
  if(phase===PHASE.FOCUS){
    if(cycle % settings.cycles === 0) startPhase(PHASE.LONG);
    else startPhase(PHASE.SHORT);
  } else {
    startPhase(PHASE.FOCUS, phase===PHASE.LONG ? 1 : cycle+1);
  }
}

// ---------------- CONTROLS ----------------
document.getElementById('playBtn').onclick = ()=>{
  running = !running;
  if(running){ lastTick = performance.now(); beep(880,0.10); }
  render();
};
document.getElementById('resetBtn').onclick = ()=>{
  running = false; startPhase(PHASE.FOCUS, 1);
};

// settings view
const timerView = document.getElementById('timerView');
const settingsView = document.getElementById('settingsView');
document.getElementById('settingsBtn').onclick = ()=>{
  running = false; render();
  syncSteppers();
  timerView.classList.add('hidden');
  settingsView.classList.remove('hidden');
};
document.getElementById('doneBtn').onclick = ()=>{
  settingsView.classList.add('hidden');
  timerView.classList.remove('hidden');
  startPhase(PHASE.FOCUS, 1);  // apply new durations
  if (window.electronAPI) window.electronAPI.ipcRenderer.send('settings:save', settings);
};

// steppers
function syncSteppers(){
  document.querySelectorAll('.stepper').forEach(st=>{
    st.querySelector('.val').textContent =
      settings[st.dataset.key] + (st.dataset.key==='cycles' ? '' : 'm');
  });
}
document.querySelectorAll('.stepper button').forEach(b=>{
  b.onclick = ()=>{
    const st = b.parentElement, k = st.dataset.key;
    const min=+st.dataset.min, max=+st.dataset.max, step=+st.dataset.step;
    settings[k] = Math.min(max, Math.max(min, settings[k] + (+b.dataset.d)*step));
    syncSteppers();
  };
});

// window controls + settings persistence — only active inside Electron
window.electronAPI = null;
try { window.electronAPI = window.require ? window.require('electron') : null; } catch(e){}
if (window.electronAPI) {
  const ipc = window.electronAPI.ipcRenderer;
  document.getElementById('winClose').onclick = ()=> ipc.send('win:close');
  document.getElementById('winMin').onclick   = ()=> ipc.send('win:minimize');
  // load saved settings, then re-init the timer with them
  ipc.invoke('settings:load').then(saved=>{
    if (saved && typeof saved === 'object') {
      ['focus','short','long','cycles'].forEach(k=>{
        if (typeof saved[k] === 'number') settings[k] = saved[k];
      });
      if (!running) startPhase(PHASE.FOCUS, 1);
      syncSteppers();
    }
  });
}

render();
</script>
</body>
</html>
